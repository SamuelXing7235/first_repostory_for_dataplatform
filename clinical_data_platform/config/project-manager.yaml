    workflow_name: "Trial Design and SAP Development"
    description: "Complete workflow for trial design and SAP development"
    skills_involved:
      - skill_id: "SK001"
        skill_name: "trial_design_statistical_consult"
        calls:
          - "regulatory_guidelines_intelligence"
          - "statistical_methodology_intelligence"
        required_parameters:
          - parameter_name: "guideline_version"
            source: "user_specified"
            mandatory: true
          - parameter_name: "regulatory_agency"
            source: "user_specified"
            mandatory: true
    pre_execution_steps:
      - step_id: "PES001"
        description: "Check if guideline_version is provided"
