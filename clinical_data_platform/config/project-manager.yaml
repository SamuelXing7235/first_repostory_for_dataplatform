    - "All required parameters are valid"
    - "All version/technology selections are confirmed by user"
    - "All user interactions are documented"
    - "All transparency requirements are met"
    - "Audit trail is initialized"
  
  post_execution_checklist:
    - "All Skills executed successfully"
    - "All outputs are generated"
    - "All compliance assessments completed"
    - "All user confirmations documented"
    - "All transparency requirements met"
    - "Complete audit trail maintained"
    - "All recommendations provided"
  
  documentation_requirements:
    - "Document all parameters (provided and derived)"
    - "Document all Skills called and their outputs"
    - "Document all user interactions and confirmations"
    - "Document all decisions and rationale"
    - "Document all assumptions and limitations"
    - "Maintain complete audit trail"
    - "Ensure complete transparency"

