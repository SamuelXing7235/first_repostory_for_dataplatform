# Parameter Management Rules
parameter_management:
  required_parameters:
    - parameter_name: "guideline_version"
      applicable_skills: ["SK001", "SK004", "SK005", "SK006", "SK007"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - "ICH E9 1998"
        - "ICH E9(R1) 2019"
        - "CDISC SDTMIG 3.3"
    
    - parameter_name: "regulatory_agency"
      applicable_skills: ["SK001", "SK004", "SK005", "SK006", "SK007"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - "FDA"
        - "EMA"
        - "PMDA"
        - "NMPA"
    
    - parameter_name: "technology_stack"
      applicable_skills: ["SK002"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - '{"language": "Python", "version": "3.11"}'
    
    - parameter_name: "frontend_technology"
      applicable_skills: ["SK003"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - '{"framework": "React", "version": "18"}'
    
    - parameter_name: "backend_technology"
      applicable_skills: ["SK003"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - '{"framework": "FastAPI", "version": "0.104"}'
    
    - parameter_name: "cdisc_standard_version"
      applicable_skills: ["SK004", "SK005"]
      source: "user_specified"
      mandatory: true
      auto_select: false
      examples:
        - '{"standard": "SDTMIG", "version": "3.3"}'

## Parameter Acquisition Protocol

**Step 1: Initial Parameter Collection**
- Collect all parameters provided by user
- Identify missing required parameters
- Identify missing optional parameters

**Step 2: Required Parameter Validation**
- For each missing required parameter:
  - Identify which intelligence Skill to call
  - Call intelligence Skill to get available options
  - Present options to user with clear information
  - Request user to specify parameter
  - Wait for user confirmation
  - Document user's choice
  - Document confirmation timestamp

**Step 3: Optional Parameter Handling**
- For missing optional parameters:
  - Use default values if defined
  - Request user specification if critical
  - Document assumptions made

**Step 4: Parameter Completeness Check**
- Verify all required parameters are provided
- Verify all parameters are valid
- Document any assumptions or limitations
- Proceed to workflow execution

# User Interaction Protocol
user_interaction_protocol:
  interaction_principles:
    - "Mandatory Confirmation: All version/technology selections require user confirmation"
    - "Complete Information: Provide complete information before requesting confirmation"
    - "Clear Options: Present clear, actionable options to user"
    - "Transparency: Clearly state all constraints and implications"
    - "Documentation: Document all user interactions and confirmations"
  
  interaction_templates:
    - template_id: "version-confirmation-v1"
      template_name: "Version/Technology Confirmation Template"
      sections:
        header:
          title: "Version/Technology Confirmation Required"
          subtitle: "User Needs to Specify Version"
        context:
          label: "Context"
          description: "Brief explanation of what version/technology is needed and why"
        available_options:
          label: "Available Options"
          description: "Present all available options with detailed information"
        ways_to_specify:
          label: "Ways to Specify"
          type: "ordered_list"
        additional_questions:
          label: "Additional Questions"
          type: "dynamic_questions"
        important_notes:
          label: "Important Notes"
          type: "warning_list"
        actions:
          confirm_button: "Confirm Selection"
          cancel_button: "Cancel"

## Interaction Documentation
For each user interaction, document:
- Interaction timestamp
- Options presented
- User's choice
- User's reasoning (if provided)
- Confirmation received
- Any assumptions made

