# Error Handling
error_handling:
  missing_required_parameter:
    error: "Required parameter not provided"
    action:
      - "Identify missing parameter"
      - "Call appropriate intelligence Skill"
      - "Present options to user"
      - "Request user specification"
      - "Wait for confirmation"
      - "Document user's choice"
      - "Proceed with workflow"
  
  invalid_parameter_value:
    error: "Parameter value is invalid"
    action:
      - "Identify invalid parameter"
      - "Explain why it's invalid"
      - "Provide valid options"
      - "Request user to correct"
      - "Wait for confirmation"
      - "Document correction"
      - "Proceed with workflow"
  
  version_not_available:
    error: "Specified version not available"
    action:
      - "Call intelligence Skill to get available versions"
      - "Explain why specified version is not available"
      - "Present available options"
      - "Request user to select alternative"
      - "Wait for confirmation"
      - "Document user's choice"
      - "Proceed with workflow"
  
  technology_not_compatible:
    error: "Specified technology not compatible"
    action:
      - "Identify compatibility issue"
      - "Explain incompatibility"
      - "Present compatible alternatives"
      - "Request user to select alternative"
      - "Wait for confirmation"
      - "Document user's choice"
      - "Proceed with workflow"

# Quality Assurance
