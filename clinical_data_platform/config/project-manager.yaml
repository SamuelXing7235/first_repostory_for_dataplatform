    - "Clearly state technology specified by user"
    - "Clearly state version compatibility"
    - "Clearly state any limitations"
    - "Clearly state best practices followed"
  
  compliance_transparency:
    - "Clearly state guideline/standard used"
    - "Clearly state version used"
    - "Clearly state assessment scope"
    - "Clearly state compliance status"
    - "Clearly state identified gaps"
    - "Clearly state recommendations"
  
  audit_trail:
