# Statistical Methodology Intelligence Skill

## Overview
This skill provides intelligent retrieval and management of the latest statistical methodology developments relevant to clinical trials. It covers new statistical methods, models, frameworks, clinical trial design approaches, and regulatory acceptance. It provides methodology comparison, regulatory acceptance assessment, and methodology selection recommendations to support informed statistical methodology decisions with mandatory user confirmation and complete transparency.

## Usage
Use this skill when you need to:
- Retrieve the latest statistical methodology developments
- Query clinical trial design methods and their regulatory acceptance
- Understand new statistical models and frameworks
- Get statistical methodology selection recommendations
- Compare different statistical approaches
- Make methodology decisions for SAP development
- Ensure methodology choices align with regulatory expectations
- Plan methodology migrations or updates

## Core Capabilities

### Clinical Trial Design Methods
- **Adaptive Designs**: Sample size reestimation, adaptive randomization, dose escalation
- **Enrichment Designs**: Biomarker enrichment, genetic enrichment, subgroup enrichment
- **Bayesian Designs**: Bayesian adaptive designs, hierarchical models, prior specification
- **Master Protocols**: Basket trials, umbrella trials, platform trials
- **Group Sequential Designs**: Interim analyses, early stopping, alpha spending

### Statistical Methods and Models
- **Primary Analysis Methods**: ANCOVA, mixed models, logistic regression, Cox models
- **Multiplicity Adjustments**: Gatekeeping, graphical approaches, FDR, Bonferroni
- **Missing Data Methods**: Multiple imputation, MMRM, pattern-mixture models
- **Subgroup Analysis**: Pre-specified vs post-hoc, interaction tests, multiplicity
- **Non-Parametric Methods**: Rank-based methods, permutation tests, bootstrap

### Statistical Frameworks
- **Frequentist Framework**: Traditional hypothesis testing, p-values, confidence intervals
- **Bayesian Framework**: Prior distributions, posterior inference, credible intervals
- **Hybrid Approaches**: Bayesian frequentist synthesis, adaptive Bayesian methods
- **Machine Learning Integration**: ML for covariate selection, ML for subgroup identification

### Regulatory Acceptance and Guidance
- **FDA Guidance**: Adaptive designs, enrichment strategies, multiplicity, missing data
- **EMA Guidelines**: Reflection papers, scientific advice, qualification opinions
- **PMDA Requirements**: Specific requirements for Japanese submissions
- **ICH Guidelines**: E9 (statistical principles), E8 (design), E6 (GCP)

### Statistical Software Updates
- **SAS Updates**: New procedures, enhanced capabilities, performance improvements
- **R Packages**: New packages, updated packages, improved functionality
- **Python Libraries**: New libraries, enhanced capabilities, better integration

## Input Format

### Required Parameters
- **methodology_domain** (required): Methodology domain of interest
  - Examples: "clinical_trial_design", "statistical_methods", "multiplicity", "missing_data", "bayesian_methods"
  
- **application_context** (required): Application context
  - Examples: "phase_iii_trial", "phase_ii_trial", "exploratory_analysis", "regulatory_submission"

### Optional Parameters
- **trial_type** (optional): Type of clinical trial
  - Examples: "parallel", "crossover", "factorial", "adaptive"
  
- **endpoint_type** (optional): Type of endpoint
  - Examples: "continuous", "binary", "time_to_event", "count"
  
- **methodology_name** (optional): Specific methodology name
  - Examples: "sample_size_reestimation", "gatekeeping", "MMRM"
  
- **regulatory_agency** (optional): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"

