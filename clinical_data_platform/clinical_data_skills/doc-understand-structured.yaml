# Structured Document Understanding Skill

## Overview
This skill enables AI agents to deeply understand and extract structured information from clinical trial documents across multiple formats and types. It handles various document formats and can identify key sections, extract entities, and structure the information for further processing or consistency checking.

## Usage
Use this skill when you need to:
- Extract key information from Protocol, SAP, CRF, CSR, or regulatory documents
- Parse specific sections like objectives, endpoints, study design, inclusion/exclusion criteria
- Understand document structure and relationships
- Prepare document content for consistency checking or analysis
- Support regulatory submission preparation

## Core Capabilities

### Document Format Support
- **PDF Documents**: Extract text and basic structure from PDF files
- **Word Documents**: Parse .docx files with formatting preservation
- **Markdown Files**: Process structured markdown documentation
- **Text Files**: Handle plain text with basic structure recognition
- **Excel Files**: Parse structured data and metadata from spreadsheets

### Section Recognition
Automatically identify and locate key sections across document types:
- **Protocol**: Study Objectives, Endpoints, Study Design, Inclusion/Exclusion Criteria, Schedule of Assessments, Statistical Methods
- **SAP**: Analysis Populations, Endpoints, Statistical Methods, TFL Specifications, Missing Data Handling
- **CRF**: Visit schedules, Form structures, Field definitions, Data collection points
- **CSR**: Study results, Safety summaries, Efficacy analyses, Discussion sections
- **Regulatory Documents**: Compliance requirements, Submission guidelines, Validation rules

### Entity Extraction
Extract structured information including:
- Primary and secondary endpoints with definitions and assessment timepoints
- Study population characteristics and inclusion/exclusion criteria
- Treatment arms, dosing regimens, and randomization schemes
- Visit schedules, assessments, and data collection timepoints
- Sample size, power calculations, and statistical assumptions
- Statistical methods, analysis plans, and sensitivity analyses
- Safety parameters and adverse event definitions
- CDISC domain mappings and variable specifications

## Input Format

### Required Parameters
- `file_paths`: Array of document file paths to process
- `target_sections`: Array of section types to extract (e.g., ["endpoints", "study_design", "inclusion_criteria"])
- `document_type`: Type of document being processed ("protocol", "sap", "crf", "csr", "regulatory")

### Optional Parameters
- `output_format`: Format for structured output (JSON, CSV, markdown) - default: "JSON"
- `include_metadata`: Whether to include source location metadata - default: true
- `language`: Document language for better parsing - default: "en"
- `extraction_depth`: Level of detail ("basic", "detailed", "comprehensive") - default: "detailed"

