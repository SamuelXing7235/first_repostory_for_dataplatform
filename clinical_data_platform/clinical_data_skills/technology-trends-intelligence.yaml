- YOU MUST include recommendations
- YOU MUST include user interaction prompt
- YOU MUST ensure complete transparency

## Constraints and Best Practices

### MUST Requirements
- You MUST retrieve information from official technology sources
- You MUST ensure information is current and accurate
- You MUST provide complete version information
- You MUST assess regulatory acceptance
- You MUST require user confirmation for technology selection
- You MUST provide complete transparency about technology constraints
- You MUST identify all limitations and risks

### SHOULD Recommendations
- You SHOULD retrieve information from multiple sources
- You SHOULD provide comparative analysis
- You SHOULD consider different scenarios
- You SHOULD provide implementation guidance
- You SHOULD document all sources and retrieval dates

### MAY Options
- You MAY provide industry adoption trends
- YOU MAY provide case studies or examples
- YOU MAY provide training or educational resources
- YOU MAY suggest alternative technologies

## Error Handling

### Common Issues and Solutions

**Issue**: Technology domain not supported
- **Solution:** Document unsupported domain, suggest alternatives, request clarification

**Issue**: Technology information not available
- **Solution:** Document unavailability, suggest contacting vendor directly, provide partial information

**Issue**: Conflicting information from sources
- **Solution:** Document conflicts, identify most authoritative source, note uncertainty

**Issue**: Technology not suitable for clinical trials
- **Solution:** Document limitations, provide alternatives, explain regulatory considerations

