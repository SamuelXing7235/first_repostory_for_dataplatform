# Technology Trends Intelligence Skill

## Overview
This skill provides intelligent retrieval and management of the latest technology trends relevant to clinical data analysis. It covers programming languages, statistical programming libraries, code generation technologies, development tools, and system architectures. It provides version management, compatibility analysis, and technology selection recommendations to support informed technology stack decisions with mandatory user confirmation and complete transparency.

## Usage
Use this skill when you need to:
- Retrieve the latest programming language versions and features
- Query statistical programming libraries and their capabilities
- Understand code generation technologies and their maturity
- Get development tools and environment recommendations
- Analyze system architecture trends and patterns
- Make technology stack decisions
- Plan technology migrations
- Ensure technology choices align with clinical trial requirements

## Core Capabilities

### Programming Language Trends
- **Python**: Latest versions, features, performance improvements, compatibility
- **R**: Latest versions, packages, IDE support, compatibility
- **SAS**: Latest versions, procedures, capabilities, licensing
- **Other Languages**: Julia, SQL, JavaScript (for web interfaces)

### Statistical Programming Libraries
- **Python Libraries**: pandas, numpy, scipy, statsmodels, scikit-learn, lifelines, pymc3
- **R Packages**: tidyverse, tidymodels, survival, lme4, brms, data.table
- **SAS Procedures**: PROC MIXED, PROC GLIMMIX, PROC PHREG, PROC MCMC
- **Library Compatibility**: Version compatibility, dependency management

### Code Generation Technologies
- **AI-Assisted Programming**: GitHub Copilot, ChatGPT Code Interpreter, Amazon CodeWhisperer
- **Automated Code Generation**: SAS Macro Generator, R Code Generation Packages
- **Template-Based Generation**: Code templates, framework generators
- **Maturity Assessment**: Technology maturity, reliability, regulatory acceptance

### Development Tools and Environments
- **IDEs**: JupyterLab, RStudio, VS Code, PyCharm
- **Version Control**: Git, GitHub, GitLab
- **Containerization**: Docker, Kubernetes
- **Cloud Platforms**: AWS, Azure, GCP
- **Collaboration Tools**: JupyterHub, RStudio Server

### System Architecture Trends
- **Frontend Frameworks**: React, Vue, Next.js, Shiny
- **Backend Frameworks**: Flask, Django, FastAPI, Plumber
- **Database Technologies**: PostgreSQL, MySQL, MongoDB
- **API Design**: REST, GraphQL, OpenAPI
- **Deployment Patterns**: Microservices, Serverless, Event-Driven

## Input Format

### Required Parameters
- **technology_domain** (required): Technology domain of interest
  - Examples: "programming_languages", "statistical_libraries", "code_generation", "development_tools", "system_architecture"
  
- **application_scenario** (required): Application scenario
  - Examples: "clinical_data_analysis", "regulatory_submission", "exploratory_analysis", "data_visualization", "system_development"

### Optional Parameters
- **language** (optional): Specific programming language
  - Examples: "Python", "R", "SAS"
  
- **technology_name** (optional): Specific technology name
  - Examples: "pandas", "React", "Docker"
  
- **version** (optional): Specific version number
  - If specified, returns detailed information about that version
  
- **include_deprecated** (optional, default: false): Whether to include deprecated technologies
  
- **include_comparison** (optional, default: true): Whether to include technology comparison

