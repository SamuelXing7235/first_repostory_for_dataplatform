## Error Handling

### Common Issues and Solutions

**Issue**: Insufficient information for sample size calculation
- **Solution**: Request missing parameters (effect size, standard deviation, etc.), provide ranges based on literature, flag assumptions clearly

**Issue**: Endpoint type unclear or mixed
- **Solution**: Clarify primary endpoint definition, recommend appropriate method for each endpoint type, consider composite endpoints

**Issue**: Complex design with multiple factors
- **Solution**: Break down into components, use appropriate advanced methods (mixed models, GEE), recommend consulting with senior statistician

**Issue**: Historical data unavailable for parameter estimation
- **Solution**: Use published literature, conduct pilot study, provide sensitivity analysis across reasonable parameter ranges

**Issue**: Regulatory requirements unclear
- **Solution**: Reference ICH guidelines, provide regulatory-compliant approaches, flag areas requiring regulatory consultation

**Issue**: Multiple primary endpoints with multiplicity concerns
- **Solution**: Recommend hierarchical testing, gatekeeping procedures, or other multiplicity adjustment methods

**Issue**: High expected dropout rate
- **Solution**: Adjust sample size accordingly, consider strategies to improve retention, document dropout assumptions

**Issue**: Small sample size with limited power
- **Solution**: Discuss feasibility, consider alternative endpoints or designs, document power limitations clearly

