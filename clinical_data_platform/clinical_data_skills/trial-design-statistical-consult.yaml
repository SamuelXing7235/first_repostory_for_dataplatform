### SAP Section Draft Output

```markdown

## Sample Size Determination

Based on the primary endpoint of change from baseline in systolic blood pressure at Week 12, a sample size of 64 subjects per treatment group (total N=128) will provide 80% power to detect a difference of 5 mmHg between treatment groups, assuming a standard deviation of 15 mmHg, using a two-sided t-test at α=0.05. The calculation assumes a 10% dropout rate; therefore, 71 subjects per group will be randomized.

## Sensitivity Analysis

Sensitivity analyses were conducted to assess the impact of key assumptions on sample size requirements:

| Effect Size (mmHg) | Required Sample Size (Total) |
| ------------------ | ---------------------------- |
| 4.0                | 200                          |
| 4.5                | 142                          |
| 5.0                | 128                          |
| 5.5                | 104                          |
| 6.0                | 90                           |

## Randomization

Subjects will be randomized in a 1:1 ratio to receive either Treatment or Placebo using stratified block randomization. Randomization will be stratified by study site and disease stage (Stage I, II, III) to ensure balance across these important prognostic factors. Variable block sizes (4 and 6) will be used to maintain allocation concealment.

## Statistical Methods

### Primary Endpoint Analysis

The primary endpoint, change from baseline in systolic blood pressure at Week 12, will be analyzed using analysis of covariance (ANCOVA). The model will include treatment group as a fixed effect and baseline blood pressure as a covariate. The least squares mean difference between treatment groups and its two-sided 95% confidence interval will be calculated.

### Analysis Populations

Intent-to-Treat (ITT) Population: All randomized subjects who receive at least one dose of study medication
Per-Protocol (PP) Population: Subjects who complete the study without major protocol deviations
Safety Population: All randomized subjects who receive at least one dose of study medication

### Missing Data Handling

Missing data for the primary endpoint will be handled using multiple imputation under the missing at random (MAR) assumption. Sensitivity analyses using last observation carried forward (LOCF) and complete case analysis will be performed.
```

