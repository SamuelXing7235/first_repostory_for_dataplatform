# Trial Design Statistical Consultation Skill

## Overview
This skill provides expert statistical guidance for clinical trial design, supporting biostatisticians and clinical teams in making informed decisions about study design parameters. It combines statistical theory with practical considerations to ensure studies are adequately powered and methodologically sound.

## Usage

Use this skill when you need to:
- Calculate sample size for various trial designs
- Select appropriate statistical models based on endpoint types
- Design randomization schemes and stratification factors
- Generate SAP statistical methods sections
- Perform sensitivity analyses for design parameters
- Assess feasibility of proposed study designs
- Support protocol development with statistical justification

## Core Capabilities

### Sample Size Calculation

- **Multiple Design Support**: Handles parallel, crossover, factorial, and group sequential designs
- **Endpoint Types**: Supports continuous, categorical, time-to-event, and count endpoints
- **Power Analysis**: Calculates power for given sample size or sample size for desired power
- **Sensitivity Analysis**: Assesses impact of parameter assumptions on sample size
- **Dropout Adjustment**: Accounts for expected dropout rates in sample size calculations

### Statistical Model Recommendation
- **Model Selection**: Recommends appropriate statistical models based on study design and endpoints
- **Assumption Checking**: Identifies key assumptions for recommended models
- **Method Comparison**: Compares alternative statistical approaches
- **Regulatory Alignment**: Ensures methods align with ICH E9 and regulatory expectations

### Randomization Design
- **Scheme Selection**: Recommends randomization methods (simple, block, stratified, adaptive)
- **Stratification Factors**: Identifies important stratification factors based on prognostic variables
- **Allocation Ratios**: Suggests appropriate treatment allocation ratios
- **Implementation Guidance**: Provides practical guidance for randomization implementation

### SAP Section Generation
- **Statistical Methods**: Drafts statistical methods sections following ICH E9 structure
- **Analysis Populations**: Defines analysis populations (ITT, PP, safety, etc.)
- **Multiplicity Adjustments**: Addresses multiplicity issues for multiple endpoints
- **Missing Data Handling**: Provides strategies for handling missing data

## Input Format

### Required Parameters
- **protocol_document** (required): Clinical trial protocol document
  - File path or content of the protocol
  
- **guideline_version** (required): Regulatory guideline version
  - Must be specified by user (e.g., "ICH E9 1998", "ICH E9(R1) 2019")
  - Cannot be auto-selected
  - If not provided, must call regulatory_guidelines_intelligence first
  
- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"

- `study_design`: Study design parameters

  ```json
    {
      "design_type": "parallel",
      "arms": [
          "Treatment",
          "Placebo"
      ],
      "allocation_ratio": [
          1,
          1
      ],
      "primary_endpoint": {
          "type": "continuous",
          "description": "Change from baseline in systolic blood pressure",
          "measurement_scale": "mmHg",
          "assessment_timepoints": [
              "Baseline",
              "Week 12"
          ]
      }
    }
  ```

### Optional Parameters
- **methodology_preferences** (optional): User's methodology preferences
  - Examples: "adaptive_design", "bayesian", "enrichment"
  
- **trial_phase** (optional): Phase of clinical trial
  - Examples: "Phase I", "Phase II", "Phase III", "Phase IV"

- `sample_size_parameters`: Parameters for sample size calculation

  ```json
    {
      "effect_size": 5.0,
      "standard_deviation": 15.0,
      "alpha": 0.05,
      "power": 0.80,
      "dropout_rate": 0.10,
      "two_sided": true
    }
  ```

- `randomization_parameters`: Randomization design parameters

  ```json
    {
      "method": "stratified_block",
      "block_size": 4,
      "stratification_factors": [
          "site",
          "disease_stage"
      ]
    }
  ```

- `analysis_parameters`: Statistical analysis preferences
  
  ```json
  {
      "primary_analysis_method": "ANCOVA",
      "covariates": [
          "baseline_value",
          "age"
       ],
       "multiplicity_method": "hierarchical_testing"
  }
  ```

