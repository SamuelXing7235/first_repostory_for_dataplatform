## Implementation Steps

### 0. Pre-Analysis: Version Confirmation (NEW)
Confirm guideline version with user before proceeding.

**Constraints:**
- You MUST confirm guideline_version is specified by user
- If guideline_version is not provided:
  - You MUST call `regulatory_guidelines_intelligence` with:
    - guideline_type: "ICH E9"
    - regulatory_agency: [user-specified agency]
    - time_point: "current"
  - You MUST present available versions to user
  - You MUST request user to specify version
  - You MUST NOT auto-select any version
- You MUST document version confirmation
- You MUST ensure transparency about version used

### 1. Regulatory Guidelines Retrieval (NEW)
Retrieve latest regulatory guidelines and requirements.

**Constraints:**
- You MUST call `regulatory_guidelines_intelligence` with:
  - guideline_type: "ICH E9"
  - guideline_version: [user-specified version]
  - regulatory_agency: [user-specified agency]
- You MUST retrieve relevant regulatory requirements
- You MUST identify any recent updates or changes
- You MUST document regulatory considerations

### 2. Statistical Methodology Intelligence (NEW)
Retrieve latest statistical methodology developments.

**Constraints:**
- You MUST call `statistical_methodology_intelligence` with:
  - methodology_domain: "clinical_trial_design"
  - application_context: [trial_phase]
  - regulatory_agency: [user-specified agency]
- You MUST retrieve latest methodology developments
- You MUST assess regulatory acceptance of methodologies
- You MUST identify suitable methodologies for the trial

### 3. Parameter Understanding and Validation
- Extract or receive key design parameters from user input or protocol
- Validate parameter values are within reasonable ranges
- Identify missing parameters and request if needed
- Assess feasibility of proposed design

### 4. Protocol Analysis
#### 1. Study Design Analysis
- Analyze the provided study design parameters (design type, arms, allocation ratio)
- Review primary endpoint characteristics (type, measurement scale, assessment timepoints)
- Identify key design features that influence statistical approach

#### 2. Sample Size Calculation
- Determine appropriate sample size formula based on design type and endpoint type
- Calculate sample size using provided parameters (effect size, standard deviation, alpha, power)
- Apply dropout rate adjustment to determine required enrollment
- Perform sensitivity analysis for key assumptions
- Document calculation methodology and assumptions

#### 3. Statistical Model Selection
- Evaluate endpoint type and distribution characteristics
- Review study design features (parallel, crossover, repeated measures)
- Consider regulatory requirements and ICH E9 guidelines
- Recommend primary analysis method with rationale
- Identify alternative methods for sensitivity analyses
- Specify model assumptions and diagnostic approaches

#### 4. Randomization Design
- Assess study characteristics to recommend appropriate randomization method
- Identify prognostic factors for stratification
- Determine optimal block sizes and allocation ratios
- Provide implementation guidance and practical considerations
- Generate example randomization list structure

### 5. SAP Section Generation
- Draft sample size determination section with calculations and assumptions
- Write statistical methods section following ICH E9 structure
- Define analysis populations (ITT, PP, safety)
- Specify multiplicity adjustment strategies
- Document missing data handling approaches
- Include sensitivity analysis plans

### 6. Validation and Review
- Verify all calculations are mathematically correct
- Ensure recommendations align with regulatory expectations
- Check consistency across all generated sections
- Provide clear rationale for all recommendations
- Flag any areas requiring additional information or assumptions

