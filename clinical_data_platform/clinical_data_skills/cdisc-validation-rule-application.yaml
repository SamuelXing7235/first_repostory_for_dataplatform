# CDISC Validation Rule Application Skill

## Overview
This skill automates the comprehensive CDISC compliance validation process for clinical trial datasets. It integrates with standard validation tools like Pinnacle 21, executes validation checks, parses validation reports, categorizes issues by severity and type, and provides actionable resolution suggestions. This skill is essential for ensuring data submission readiness and regulatory compliance.

## Usage
Use this skill when you need to:
- Perform pre-submission CDISC compliance validation
- Conduct automated quality control on SDTM and ADaM datasets
- Validate Define-XML files against dataset content
- Generate compliance reports for regulatory submissions
- Identify and categorize data quality issues
- Provide actionable recommendations for issue resolution
- Support database lock and submission preparation activities

## Core Capabilities

### External Tool Integration
- **Pinnacle 21 Integration**: Interfaces with Pinnacle 21 Community/Enterprise validation engine
- **Command Line Execution**: Executes validation tools through command line interfaces or APIs
- **Configuration Management**: Manages validation configurations and rule sets
- **Version Control**: Supports multiple CDISC standard versions (SDTMIG 3.2, 3.3; ADaMIG 1.0, 1.1)
- **Batch Processing**: Handles multiple datasets and validation rules in batch mode

### Validation Task Execution
- **Dataset Validation**: Validates SDTM and ADaM datasets against CDISC standards
- **Define-XML Validation**: Checks Define-XML files for consistency with dataset content
- **Rule-Based Checking**: Applies standard CDISC validation rules (e.g., SD1117, AD0001)
- **Custom Rule Support**: Supports custom validation rules and sponsor-specific checks
- **Cross-Dataset Validation**: Performs cross-dataset consistency checks
- **Controlled Terminology Validation**: Verifies correct usage of CDISC controlled terminology

### Validation Report Intelligent Parsing
- **Multi-Format Support**: Parses validation reports in various formats (Excel, XML, JSON)
- **Issue Extraction**: Extracts individual validation issues with full context
- **Structured Data Conversion**: Converts unstructured report data into structured format
- **Metadata Preservation**: Maintains issue metadata (rule ID, severity, description, location)
- **Source Identification**: Identifies specific datasets, variables, and records with issues
- **Error Context**: Preserves contextual information for each issue

### Issue Categorization and Analysis
- **Severity Classification**: Categorizes issues by severity:
  - **Critical**: Errors that must be resolved before submission
  - **Major**: Significant issues that should be resolved
  - **Minor**: Issues that should be reviewed and addressed
  - **Warning**: Informational items that may not require action
- **Type Classification**: Groups issues by type:
  - **Structural**: Dataset structure and organization issues
  - **Variable**: Variable definition and attribute issues
  - **Value**: Data value and format issues
  - **Relationship**: Relationship and referential integrity issues
  - **Terminology**: Controlled terminology usage issues
- **Risk Assessment**: Evaluates potential impact on submission and analysis
- **Priority Ranking**: Prioritizes issues based on severity and impact

### Solution Recommendation
- **Knowledge Base Integration**: Maintains knowledge base of common validation issues and solutions
- **Automated Suggestions**: Provides automated resolution suggestions for common issues:
  - Date format corrections
  - Missing required variables
  - Controlled terminology errors
  - Variable length violations
  - Referential integrity issues
- **Code Examples**: Generates example code snippets for common fixes
- **Documentation References**: Provides references to relevant CDISC implementation guides
- **Best Practice Guidance**: Offers best practice recommendations for complex issues

### Report Generation and Issue Tracking
- **Executive Summary**: Generates concise management-level summary reports
- **Detailed Issue Reports**: Creates comprehensive reports with all validation findings
- **Issue Tracking Tables**: Produces actionable issue tracking tables in CSV or Jira import format
- **Visual Dashboards**: Creates visual representations of validation results
- **Trend Analysis**: Identifies patterns and trends in validation issues
- **Progress Tracking**: Monitors issue resolution progress over time

## Input Format

### Required Parameters
- **dataset_path** (required): Path to CDISC datasets
  - File path or directory containing CDISC datasets

- `define_xml_path`: Path to Define-XML file
- **cdisc_standard_version** (required): CDISC standard version
  - Must be specified by user
  - Examples:
    - {"standard": "SDTMIG", "version": "3.3"}
    - {"standard": "ADaMIG", "version": "1.1"}
  - If not provided, must call regulatory_guidelines_intelligence first

- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"

### Optional Parameters
- `validation_tool`: Validation tool to use ("pinnacle21", "opensource", "custom")
- `custom_rules`: Path to custom validation rules file
- `output_format`: Output format for reports ("JSON", "Excel", "HTML", "PDF")
- `include_suggestions`: Whether to include resolution suggestions (default: true)
- `severity_filter`: Filter issues by minimum severity level
- **validation_level** (optional): Validation level
  - Examples: "basic", "standard", "comprehensive"

