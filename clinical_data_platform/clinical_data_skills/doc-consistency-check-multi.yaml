# Multi-Document Consistency Check Skill

## Overview
This skill performs systematic cross-referencing of multiple clinical trial documents to identify inconsistencies, discrepancies, and alignment issues. It ensures that key definitions and elements are consistent across Protocol, SAP, CRF, and other related documents, which is critical for trial quality and regulatory compliance.

## Usage
Use this skill when you need to:
- Verify consistency between Protocol, SAP, and CRF documents
- Perform quality audits during trial design phase
- Compare different versions of the same document
- Identify discrepancies in endpoint definitions, visit schedules, and variable definitions
- Ensure alignment before study initiation
- Support regulatory submission preparation

## Core Capabilities

### Systematic Document Comparison
- **Sequential Traversal**: Systematically compares documents following predefined logic (by section, by definition) to ensure complete coverage
- **Non-Random Processing**: Ensures methodical comparison rather than random sampling
- **Comprehensive Coverage**: Checks all relevant sections and elements systematically

### Consistency Check Rules
Built-in core checking rules with support for custom rules:
- **Endpoint Consistency**: Validates that primary/secondary endpoints defined in Protocol match exactly with SAP in terms of name, definition, and assessment timepoints
- **Visit Schedule Consistency**: Compares Protocol's Schedule of Assessments with CRF's Visits to identify missing or extra visits
- **Data Collection Consistency**: Confirms that variables used in SAP analysis can be found in CRF data collection points
- **Population Definition Consistency**: Checks for contradictions between Protocol inclusion/exclusion criteria and SAP analysis population definitions
- **Version Difference Comparison**: Performs differential analysis when comparing two versions of the same document

### Multi-Format Support
- Handles various document formats: PDF, DOCX, Markdown, TXT
- Processes structured and unstructured content
- Parses tables, especially Schedule of Assessments, into structured formats
- Maintains source location traceability

## Input Format

### Required Parameters
- `documents`: Array of document objects with type and path
  docs_json_schema: |-
    {
     "documents": [
        {
            "type": "Protocol",
            "path": "path/to/protocol.pdf"
        },
        {
            "type": "SAP",
            "path": "path/to/sap.docx"
        },
        {
            "type": "CRF",
            "path": "path/to/crf.pdf"
        }
     ]
    }
  
- `check_rules`: Array of consistency check types to perform
  Options: ["endpoints", "visits", "data_collection", "population", "variables", "all"]

### Optional Parameters
- `custom_rules`: Array of custom consistency rules
- `comparison_mode`: Mode for comparison ("strict", "moderate", "lenient")
- `output_format`: Format for consistency report ("markdown", "json", "html")
- `include_suggestions`: Whether to include resolution suggestions (default: true)

