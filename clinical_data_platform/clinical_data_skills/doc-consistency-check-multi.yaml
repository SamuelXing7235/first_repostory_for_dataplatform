## Implementation Steps

### 1. Document Preprocessing and Information Extraction
- Call `doc_understand_structured` skill for each input document
- Extract key information into structured data objects
- Preserve source location information (page numbers, sections)
- Handle different document formats appropriately

### 2. Systematic Comparison Process
- Apply predefined comparison logic systematically, not randomly
- Compare documents in logical order (Protocol → SAP → CRF)
- Check each rule category comprehensively
- Maintain audit trail of all comparisons performed

### 3. Consistency Rule Application
- **Endpoint Consistency Check**:
  - Compare endpoint names, definitions, and assessment timepoints
  - Identify mismatches in primary, secondary, and exploratory endpoints
  - Check measurement methods and evaluation criteria

- **Visit Schedule Consistency Check**:
  - Map Protocol Schedule of Assessments to CRF visits
  - Identify missing, extra, or misaligned visits
  - Compare assessment timing windows

- **Data Collection Consistency Check**:
  - Verify SAP analysis variables have corresponding CRF fields
  - Identify CRF fields not used in SAP analysis
  - Check variable name and type consistency

- **Population Definition Consistency Check**:
  - Compare Protocol inclusion/exclusion criteria with SAP populations
  - Identify contradictions or ambiguities
  - Verify population flag definitions

### 4. Issue Classification and Risk Assessment
- Classify inconsistencies by severity (high, medium, low)
- Assess potential impact on study conduct and analysis
- Provide context-specific recommendations
- Prioritize issues requiring immediate attention

### 5. Report Generation
- Generate detailed consistency report in specified format
- Include source references for all identified issues
- Provide actionable suggestions for resolution
- Create summary statistics and consistency scores

## Constraints and Best Practices

### MUST Requirements
- You MUST perform systematic, non-random document comparison
- You MUST call `doc_understand_structured` skill for each document first
- You MUST preserve source location information for all findings
- You MUST apply all requested check rules comprehensively
- You MUST classify issues by severity and provide impact assessment
- You MUST generate a detailed, actionable consistency report

### SHOULD Recommendations
- You SHOULD provide specific suggestions for resolving identified issues
- You SHOULD assess risk levels based on potential impact on study quality
- You SHOULD handle semantic ambiguity carefully and flag uncertain findings
- You SHOULD support custom consistency rules when provided
- You SHOULD maintain clear audit trail of all comparisons

### MAY Options
- You MAY suggest alternative approaches for resolving inconsistencies
- You MAY provide historical context from similar studies
- You MAY recommend additional documents for review
- You MAY generate comparison matrices or visual summaries

## Error Handling

### Common Issues and Solutions

**Issue**: Document parsing fails
- **Solution**: Try alternative parsing methods, flag document for manual review, proceed with available documents

**Issue**: Semantic ambiguity leads to uncertain conclusions
- **Solution**: Flag as "requires human review", provide context for decision making, note confidence level

**Issue**: Large number of minor inconsistencies
- **Solution**: Group similar issues, prioritize by impact, provide summary statistics

**Issue**: Version comparison shows extensive changes
- **Solution**: Generate detailed change log, highlight critical changes, assess impact on study conduct

