## Implementation Steps

### 1. Requirements Analysis and Assessment
- Analyze platform requirements from input JSON
- Assess data volume, user scale, and performance needs
- Identify security and compliance requirements
- Evaluate integration needs with existing systems
- Determine advanced feature requirements (federated learning, AI/ML)

### 2. Cloud Provider Selection and Strategy
- Evaluate cloud providers based on requirements
- Consider multi-cloud or hybrid cloud strategies
- Assess geographic and data residency requirements
- Analyze cost structures and optimization opportunities
- Plan for cloud migration strategy

### 3. High-Level Architecture Design
- Design overall system architecture
- Define component boundaries and interactions
- Plan data flows and integration patterns
- Design network architecture and security zones
- Plan for high availability and disaster recovery

### 4. Detailed Component Design
- **Data Storage**: Design data lake, data warehouse, and database architectures
- **Compute Layer**: Plan batch processing, serverless, and containerized workloads
- **API Layer**: Design API gateway, microservices, and integration patterns
- **Security**: Implement identity management, encryption, and network security
- **Monitoring**: Design logging, monitoring, and alerting systems

### 5. FAIR Principles Implementation
- **Findable**: Design metadata catalog and search capabilities
- **Accessible**: Implement APIs with proper authentication and authorization
- **Interoperable**: Adopt data standards and API standards
- **Reusable**: Create data dictionaries and provenance tracking

### 6. Security and Compliance Design
- Implement defense-in-depth security strategy
- Design encryption and key management
- Plan compliance controls and audit logging
- Implement data classification and handling procedures
- Design incident response and monitoring

### 7. Cost Optimization and Planning
- Analyze cost structures by component
- Implement cost optimization strategies
- Plan for reserved instances and savings plans
- Design for cost monitoring and optimization
- Create total cost of ownership (TCO) analysis

### 8. Documentation and Delivery
- Generate comprehensive architecture document
- Create architecture diagrams using Mermaid or similar tools
- Provide implementation roadmap with phases
- Include cost estimates and risk assessment
- Document best practices and operational guidelines

## Constraints and Best Practices

### MUST Requirements
- You MUST design architectures that comply with HIPAA, GDPR, and other relevant regulations
- You MUST implement defense-in-depth security principles
- You MUST ensure high availability and disaster recovery capabilities
- You MUST design for scalability and performance requirements
- You MUST include comprehensive monitoring and logging
- You MUST follow cloud provider best practices and well-architected frameworks

### SHOULD Recommendations
- You SHOULD design for cost optimization and efficiency
- You SHOULD implement infrastructure as code (IaC) principles
- You SHOULD design for multi-region deployment when appropriate
- You SHOULD use managed services to reduce operational overhead
- You SHOULD implement automated testing and deployment pipelines
- You SHOULD design for observability and troubleshooting

### MAY Options
- You MAY suggest alternative architectural approaches
- You MAY provide recommendations for specific cloud services
- You MAY include advanced features like AI/ML integration
- You MAY suggest partnerships with cloud service providers
- You MAY provide guidance on team structure and skills needed

## Error Handling

### Common Issues and Solutions

**Issue**: Requirements are incomplete or ambiguous
- **Solution**: Ask clarifying questions, provide multiple architecture options, document assumptions

**Issue**: Security and compliance requirements conflict with performance
- **Solution**: Implement balanced approach, use performance monitoring, optimize security controls

**Issue**: Budget constraints limit architectural options
- **Solution**: Prioritize features, implement phased approach, use cost-optimized services

**Issue**: Integration with legacy systems is complex
- **Solution**: Design integration patterns, use API gateways, plan for gradual migration

