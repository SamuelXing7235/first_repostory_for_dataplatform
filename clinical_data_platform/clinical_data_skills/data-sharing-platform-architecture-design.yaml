# Data Sharing Platform Architecture Design Skill

## Overview
This skill provides comprehensive cloud-native architecture design for clinical data sharing platforms. It adheres to FAIR principles (Findable, Accessible, Interoperable, Reusable) and security best practices while suggesting appropriate cloud services (AWS, Azure, GCP) for data storage, computing, user authentication, and API gateways. This skill is essential for designing platforms that enable secure, compliant, and efficient sharing of clinical trial data.

## Usage
Use this skill when you need to:
- Design new clinical data sharing platforms
- Plan cloud migration strategies for clinical data systems
- Architecture data collaboration platforms for multi-study analysis
- Design platforms that support FAIR principles
- Create secure environments for external data sharing
- Plan infrastructure for real-world evidence (RWE) initiatives

## Core Capabilities

### Requirements Analysis and Assessment
- **Data Volume Analysis**: Assess data scale, growth projections, and storage requirements
- **User Scale Evaluation**: Estimate concurrent user access and authentication requirements
- **Security Compliance**: Identify regulatory requirements (HIPAA, GDPR, 21 CFR Part 11)
- **Performance Requirements**: Define latency, throughput, and availability SLAs
- **Integration Needs**: Identify systems requiring integration (EDC, CTMS, statistical systems)
- **Advanced Features**: Assess needs for federated learning, confidential computing, or AI/ML capabilities

### Cloud-Native Architecture Design
- **Microservices Architecture**: Design scalable, maintainable microservices-based architecture
- **Serverless Components**: Recommend serverless services for cost optimization and scalability
- **Container Orchestration**: Suggest container platforms (EKS, AKS, GKE) for application deployment
- **Event-Driven Architecture**: Design event-driven patterns for real-time data processing
- **API-First Design**: Implement API-first approach for interoperability
- **Multi-Region Deployment**: Plan for disaster recovery and low-latency access

### Component Architecture Recommendations

#### Data Storage Layer
- **Data Lake**: Amazon S3 / Azure Blob Storage / Google Cloud Storage for raw and processed data
- **Structured Data**: Amazon RDS / Azure SQL / Google Cloud SQL for relational data
- **NoSQL Data**: Amazon DynamoDB / Azure Cosmos DB / Google Firestore for flexible schemas
- **Data Warehouse**: Amazon Redshift / Azure Synapse / Google BigQuery for analytics
- **Data Catalog**: AWS Glue / Azure Purview / Google Data Catalog for metadata management

#### Compute Layer
- **Batch Processing**: Amazon EC2 / Azure VMs / Google Compute Engine for batch jobs
- **Serverless Computing**: AWS Lambda / Azure Functions / Google Cloud Functions for event-driven workloads
- **Container Computing**: AWS Fargate / Azure Container Instances / Google Cloud Run for containerized apps
- **High-Performance Computing**: AWS Batch / Azure Batch / Google Cloud Batch for HPC workloads

#### API and Integration Layer
- **API Gateway**: Amazon API Gateway / Azure API Management / Google Apigee for API management
- **Security**: AWS WAF / Azure WAF / Google Cloud Armor for protection
- **Message Queuing**: Amazon SQS / Azure Service Bus / Google Pub/Sub for async processing
- **Event Streaming**: Amazon Kinesis / Azure Event Hubs / Google Pub/Sub for real-time data

#### Identity and Access Management
- **Authentication**: Amazon Cognito / Azure AD / Google Identity Platform for user authentication
- **Authorization**: AWS IAM / Azure RBAC / Google IAM for fine-grained access control
- **Directory Services**: AWS Managed Microsoft AD / Azure AD DS for enterprise integration
- **Multi-Factor Auth**: Implement MFA for enhanced security

#### Security and Compliance
- **Encryption**: AWS KMS / Azure Key Vault / Google Cloud KMS for encryption key management
- **Network Security**: VPC / VNet / VPC for network isolation and security
- **Monitoring**: AWS CloudTrail / Azure Monitor / Google Cloud Operations Suite for audit logging
- **Compliance**: Implement controls for HIPAA, GDPR, GxP compliance

### FAIR Principles Implementation
- **Findable**: Design comprehensive metadata catalog services with search capabilities
- **Accessible**: Implement standard APIs with clear authentication and authorization mechanisms
- **Interoperable**: Emphasize use of common data standards (CDISC, FHIR, OMOP)
- **Reusable**: Provide clear data dictionaries, licensing information, and provenance tracking

### Data Standards and Interoperability
- **CDISC Standards**: Adopt CDISC SDTM, ADaM, and Define-XML as data exchange standards
- **Modern Formats**: Support Dataset-JSON, Parquet, and other modern data formats
- **API Standards**: Implement RESTful APIs following OpenAPI/Swagger specifications
- **FHIR Integration**: Support HL7 FHIR for healthcare data interoperability
- **Metadata Standards**: Use Dublin Core, schema.org, or domain-specific metadata standards

