## Error Handling

### Common Issues and Solutions

**Issue**: Statistical assumptions are violated
- **Solution**: Document violation, assess impact, suggest alternative methods, recommend sensitivity analyses

**Issue**: Sample size is inadequate for planned analyses
- **Solution**: Document power limitations, interpret findings cautiously, suggest larger confirmatory study

**Issue**: Multiple testing without adjustment
- **Solution**: Identify multiplicity issues, assess Type I error inflation, recommend adjustment methods

**Issue**: Inconsistent results across related analyses
- **Solution**: Investigate sources of inconsistency, assess data quality, recommend resolution approach

**Issue**: Clinical significance unclear
- **Solution**: Consult clinical experts, reference literature, assess minimal clinically important differences

