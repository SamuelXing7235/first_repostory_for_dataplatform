# Statistical Results Review and Interpretation Skill

## Overview
This skill provides comprehensive statistical review and interpretation of clinical trial analysis results. It combines senior biostatistician-level expertise with deep understanding of ICH E9 statistical principles, clinical trial design, and statistical programming to deliver professional assessment of statistical results, method appropriateness, and clinical significance. This skill is essential for ensuring statistical integrity, regulatory compliance, and meaningful interpretation of clinical trial findings.

## Usage
Use this skill when you need to:
- Review TFL (Tables, Figures, Listings) outputs for statistical correctness
- Interpret statistical results in clinical context
- Assess appropriateness of statistical methods applied
- Validate statistical assumptions and model diagnostics
- Evaluate clinical significance vs statistical significance
- Provide professional statistical insights and recommendations
- Support regulatory submission preparation
- Conduct statistical quality control and validation

## Core Capabilities

### Statistical Results Comprehensive Review
- **TFL Output Review**: Systematically review tables, figures, and listings for:
  - Statistical calculation accuracy (N, Mean, SD, Median, p-values)
  - Proper application of statistical methods
  - Correct handling of missing data
  - Appropriate rounding and formatting
  - Consistency across related TFLs
- **Model Output Review**: Validate statistical model outputs including:
  - ANCOVA model results and diagnostics
  - Logistic regression coefficients and odds ratios
  - Cox proportional hazards model outputs
  - Mixed model results and variance components
  - Model assumptions and goodness-of-fit
- **Statistical Summary Review**: Assess summary statistics and descriptive analyses

### Statistical Method Appropriateness Assessment
- **Method Selection Validation**: Evaluate whether statistical methods are appropriate for:
  - Data type and distribution characteristics
  - Study design and analysis objectives
  - Sample size and power considerations
  - Regulatory expectations and guidelines
- **Assumption Validation**: Verify statistical assumptions are met:
  - Normality assumptions for parametric tests
  - Homogeneity of variance
  - Independence of observations
  - Proportional hazards assumption for survival analysis
  - Linearity assumptions for regression models
- **Robustness Assessment**: Evaluate sensitivity to violations and robustness of methods

### Statistical Results Clinical Interpretation
- **P-value Interpretation**: Provide nuanced interpretation of p-values:
  - Distinguish statistical vs clinical significance
  - Consider multiple testing and Type I error
  - Interpret in context of study design and power
  - Address p-value limitations and controversies
- **Confidence Interval Interpretation**: Interpret confidence intervals appropriately:
  - Assess precision of estimates
  - Evaluate clinical relevance of CI ranges
  - Compare CIs across subgroups and timepoints
  - Interpret non-overlapping CIs appropriately
- **Effect Size Interpretation**: Provide clinical context for effect sizes:
  - Cohen's d for continuous outcomes
  - Odds Ratios and Risk Ratios for binary outcomes
  - Hazard Ratios for time-to-event outcomes
  - Number Needed to Treat (NNT) calculations
  - Clinical relevance assessment

### Advanced Statistical Analysis Review
- **Subgroup Analysis Evaluation**: Assess subgroup analyses for:
  - Pre-specified vs post-hoc nature
  - Statistical power for subgroup comparisons
  - Interaction test appropriateness
  - Multiple comparison adjustments
  - Clinical plausibility of subgroup effects
- **Multiplicity Adjustment Review**: Evaluate multiplicity handling:
  - Hierarchical testing procedures
  - Bonferroni and other adjustment methods
  - Family-wise error rate control
  - False discovery rate considerations
- **Missing Data Handling Assessment**: Review missing data approaches:
  - Missing data mechanism assessment (MCAR, MAR, MNAR)
  - Appropriateness of imputation methods
  - Sensitivity analyses for missing data
  - Impact on validity of conclusions

### Statistical Programming and Data Integrity Review
- **Code Review Assessment**: Evaluate statistical programming quality:
  - Correct implementation of statistical methods
  - Proper data handling and transformations
  - Appropriate use of statistical procedures
  - Code efficiency and maintainability
- **Data Integrity Validation**: Verify data quality and consistency:
  - Subject counts across analyses
  - Treatment group balance
  - Outlier identification and handling
  - Data consistency checks

### Regulatory and Compliance Assessment
- **ICH E9 Compliance**: Verify compliance with ICH E9 statistical principles
- **Regulatory Expectations**: Assess alignment with FDA/EMA statistical guidance
- **Documentation Review**: Evaluate statistical methods documentation
- **Submission Readiness**: Assess readiness for regulatory submission

## Input Format

### Required Parameters

- **statistical_results** (required): Statistical analysis results
  - File path or content of statistical results
  
- **guideline_version** (required): Regulatory guideline version
  - Must be specified by user
  - Examples: "ICH E9 1998", "ICH E9(R1) 2019"
  - If not provided, must call regulatory_guidelines_intelligence first
  
- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"

- **analysis_results_path**: Path to statistical analysis results (TFL outputs, model outputs, etc.)
- **analysis_type**: Type of analysis being reviewed ("primary", "secondary", "safety", "exploratory")
- **study_context**: JSON object with study context information
  ```json
  {
  "study_design": "parallel",
  "primary_endpoint": "Change from baseline in systolic blood pressure",
  "sample_size": 240,
  "treatment_groups": ["Treatment X", "Placebo"],
  "statistical_method": "ANCOVA with baseline as covariate"
  }
  ```

### Optional Parameters
- **sap_path**: Path to Statistical Analysis Plan for compliance verification
- **protocol_path**: Path to Protocol for context and objectives
- **review_depth**: Level of review detail ("basic", "standard", "comprehensive")
- **focus_areas**: Array of specific areas to focus on (e.g., ["primary_endpoint", "safety", "subgroup"])
- **include_recommendations**: Whether to include actionable recommendations (default: true)
- **methodology_context** (optional): Methodology context information
  - Examples: {"trial_phase": "Phase III", "endpoint_type": "continuous"}

