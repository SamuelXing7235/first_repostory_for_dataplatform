### Server Code Example (server.R)

```r

Server Logic for Clinical Trial Dashboard
library(shiny)
library(dplyr)
library(ggplot2)

server <- function(input, output, session) {

Reactive data filtering
filtered_data <- reactive({
data <- adae_data

# Apply treatment filter
if (!is.null(input$treatment_filter) && input$treatment_filter != "All") {
  data <- data %>% filter(TRT01P == input$treatment_filter)
}

# Apply grade filter
if (!is.null(input$grade_filter)) {
  data <- data %>% filter(AESEV >= input$grade_filter[1] & 
                           AESEV <= input$grade_filter[2])
}

# Apply system filter
if (!is.null(input$system_filter) && !"All Systems" %in% input$system_filter) {
  data <- data %>% filter(AESOC %in% input$system_filter)
}

return(data)
})

# AE Summary Plot
output$ae_summary_plot <- renderPlot({
data <- filtered_data()

ggplot(data, aes(x = AESOC, fill = TRT01P)) +
  geom_bar(position = "dodge") +
  coord_flip() +
  labs(title = "Adverse Events by System Organ Class",
       x = "System Organ Class",
       y = "Count",
       fill = "Treatment Group") +
  theme_minimal() +
  theme(axis.text.y = element_text(size = 8))
})

# Filter Summary Table
output$filter_summary <- renderTable({
data <- filtered_data()

data.frame(
  Metric = c("Total Subjects", "Total AEs", "Unique Subjects with AEs"),
  Value = c(nrow(adsl_data), nrow(data), length(unique(data$USUBJID)))
)
})

Subject selection update
observe({
selected_treatment <- input$treatment_filter
if (!is.null(selected_treatment) && selected_treatment != "All") {
subjects <- adsl_data %>%
filter(TRT01P == selected_treatment) %>%
pull(USUBJID)
updateSelectInput(session, "subject_select", choices = subjects)
}
})
}

```


