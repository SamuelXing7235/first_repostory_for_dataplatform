# Interactive Dashboard Framework Generation Skill

## Overview
This skill automates the generation of interactive analysis dashboard frameworks, primarily using R Shiny. It transforms static analysis results (TFLs) into interactive, explorable dashboards by creating UI layouts, server logic stubs, and necessary reactivity structures. This skill is essential for building data exploration tools that enable clinical teams to interactively analyze and visualize clinical trial data.

## Usage
Use this skill when you need to:
- Create interactive dashboards for clinical trial data exploration
- Transform static TFLs into dynamic, filterable visualizations
- Build standard analysis application templates for specific therapeutic areas
- Accelerate the development of data sharing and collaboration platforms
- Enable real-time data exploration and hypothesis generation
- Support blind data review and database lock preparation activities

## Core Capabilities

### Dashboard Requirements Understanding
- **Data Source Analysis**: Understand target datasets (ADAE, ADLB, ADSL, etc.) and their structures
- **Visualization Requirements**: Identify desired chart types (volcano plots, forest plots, patient profiles, waterfall plots)
- **Interaction Design**: Determine required interactive filters (by population, dose, timepoint, subgroup)
- **User Experience**: Consider user workflows and navigation patterns
- **Performance Considerations**: Assess data volume and response time requirements

### UI Layout Generation (ui.R)
- **Standard Layout Structures**: Create standard page layouts like sidebarLayout, fluidPage, navbarPage
- **Input Control Generation**: Generate code for various input widgets:
  - `selectInput` for treatment group selection
  - `sliderInput` for time range selection
  - `checkboxGroupInput` for adverse event grade selection
  - `dateRangeInput` for date filtering
  - `radioButtons` for population selection
- **Output Placeholders**: Create corresponding output placeholders for each chart or table:
  - `plotOutput` for visualizations
  - `dataTableOutput` for tabular data
  - `htmlOutput` for text summaries
- **Responsive Design**: Implement responsive layouts that work on different screen sizes
- **Styling Frameworks**: Integrate with Bootstrap, shinydashboard, or other styling frameworks

### Server Logic Generation (server.R)
- **Reactive Expressions**: Create reactive expressions for dynamic data filtering based on UI inputs
- **Data Processing**: Generate framework code for data manipulation and transformation
- **Visualization Functions**: Create renderPlot functions with ggplot2 or other visualization libraries
- **Table Rendering**: Implement renderDataTable functions with formatting and filtering options
- **Reactivity Management**: Establish proper reactive dependencies and isolate reactive contexts
- **Error Handling**: Include error handling and user feedback mechanisms

### Modular Design Implementation
- **Shiny Modules**: Generate modular code structure using Shiny Modules for complex dashboards
- **Component Reusability**: Create reusable UI and server components
- **Namespace Management**: Implement proper module namespacing to avoid conflicts
- **Module Communication**: Establish communication patterns between modules
- **Scalability**: Design for easy addition of new features and components

### Supporting Files Generation
- **global.R**: Generate global.R file for:
  - Loading necessary R packages
  - Setting global options and configurations
  - Defining global variables and constants
  - Implementing utility functions
- **Example Data**: Provide small example datasets for testing and demonstration
- **Documentation**: Include README files with setup and usage instructions
- **Configuration Files**: Generate configuration files for easy customization

## Input Format

### Required Parameters

- **dashboard_requirements** (required): Dashboard requirements document
  - File path or content of requirements
  ```json
  {
  "target_datasets": ["ADAE", "ADLB", "ADSL"],
  "visualizations": [
  {
  "type": "volcano_plot",
  "title": "Adverse Event Volcano Plot",
  "data_source": "ADAE"
  },
  {
  "type": "forest_plot",
  "title": "Efficacy Forest Plot",
  "data_source": "custom_analysis"
  }
  ],
  "filters": [
  {
  "type": "treatment_group",
  "variable": "TRT01P",
  "widget": "selectInput"
  },
  {
  "type": "time_range",
  "variable": "ADY",
  "widget": "sliderInput"
  }
  ],
  "layout": "sidebar"
  }
  ```

- **frontend_technology** (required): Frontend technology stack
  - Must be specified by user
  - Examples: 
    - {"framework": "React", "version": "18"}
    - {"framework": "Vue", "version": "3"}
    - {"framework": "Shiny", "version": "1.7"}
  - If not provided, must call technology_trends_intelligence first
  
- **backend_technology** (required): Backend technology stack
  - Must be specified by user
  - Examples:
    - {"framework": "Flask", "version": "3.0"}
    - {"framework": "FastAPI", "version": "0.104"}
    - {"framework": "Plumber", "version": "1.2"}

### Optional Parameters
- `output_dir`: Directory where dashboard code will be generated
- `use_modules`: Whether to use Shiny Modules for modular design (default: true)
- `include_examples`: Whether to include example data (default: true)
- `styling_framework`: Framework to use for styling ("bootstrap", "shinydashboard", "custom")
- `r_version`: Target R version for compatibility
- **deployment_environment** (optional): Deployment environment
  - Examples: "local", "server", "cloud", "docker"

