sidebarMenu(
menuItem("Overview", tabName = "overview", icon = icon("dashboard")),
menuItem("Safety", tabName = "safety", icon = icon("shield")),
menuItem("Efficacy", tabName = "efficacy", icon = icon("chart-line")),
menuItem("Patient Profiles", tabName = "profiles", icon = icon("user"))
),

# Filter Controls
conditionalPanel(
  condition = "input.tabs == 'safety'",
  wellPanel(
    h4("Filters"),
    selectInput("treatment_filter", "Treatment Group:",
               choices = c("All", "Placebo", "Treatment X")),
    sliderInput("grade_filter", "AE Grade:",
                min = 1, max = 5, value = c(1, 5), step = 1),
    checkboxGroupInput("system_filter", "System Organ Class:",
                      choices = c("All Systems", "GI", "Cardio", "Neuro"))
  )
)
),

dashboardBody(
tabItems(
# Overview Tab
tabItem(tabName = "overview",
fluidRow(
valueBox(245, "Total Subjects", icon = icon("users"), color = "primary"),
valueBox(122, "Treatment Group", icon = icon("medkit"), color = "success"),
valueBox(123, "Placebo Group", icon = icon("pills"), color = "info")
),
fluidRow(
box(title = "Subject Disposition",
plotOutput("disposition_plot"),
status = "primary", solidHeader = TRUE)
)
),

  # Safety Tab
  tabItem(tabName = "safety",
          fluidRow(
            box(title = "Adverse Event Summary",
