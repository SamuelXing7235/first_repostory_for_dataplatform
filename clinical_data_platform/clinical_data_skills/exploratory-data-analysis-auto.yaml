## Implementation Steps

### 1. Dataset Loading and Initial Profiling
- Load dataset from specified file path
- Detect file format and apply appropriate parser
- Calculate basic statistics: row count, column count, memory usage
- Identify variable types: numeric, character, date, factor
- Generate initial data quality metrics

### 2. Variable-Level Analysis
- For each variable in the dataset:
  - Calculate missing value count and percentage
  - Determine unique values and their frequencies
  - For numeric variables: calculate descriptive statistics
  - For categorical variables: calculate frequency distributions
  - Identify potential outliers using statistical methods
  - Assess distribution shape and normality

### 3. Univariate Statistical Analysis
- **Numerical Variables**:
  - Calculate N, Mean, SD, Median, IQR, Min, Max
  - Generate histograms with density curves
  - Create Q-Q plots for normality assessment
  - Perform Shapiro-Wilk normality tests
  - Identify outliers using IQR method (1.5 × IQR rule)
  - Generate boxplots for outlier visualization

- **Categorical Variables**:
  - Calculate frequency counts and percentages
  - Generate bar charts for distribution visualization
  - Identify rare categories (frequency < 5%)
  - Check for unexpected or misspelled categories

### 4. Bivariate and Multivariate Analysis
- **Group Comparisons**:
  - Identify key grouping variables (treatment, site, visit)
  - Generate boxplots by group for numeric variables
  - Create grouped bar charts for categorical variables
  - Perform appropriate statistical tests (t-test, ANOVA, chi-square)
  - Calculate effect sizes

- **Correlation Analysis**:
  - Calculate correlation matrix for numeric variables
  - Generate correlation heatmap visualization
  - Identify strong correlations (|r| > 0.7)
  - Perform correlation significance testing

- **Time Series Analysis**:
  - If time variables present, explore trends over time
  - Generate line plots for longitudinal data
  - Identify patterns and seasonal variations

### 5. Data Quality Assessment
- **Missing Data Analysis**:
  - Calculate missing data patterns across variables
  - Generate missing data heatmap
  - Identify variables with high missing rates (> 20%)
  - Assess missing data mechanism (MCAR, MAR, MNAR)

- **Outlier Detection**:
  - Apply IQR method for numeric variables
  - Use z-score method for normally distributed data
  - Flag extreme values for review
  - Generate outlier summary tables

- **Consistency Checks**:
  - Validate logical relationships between variables
  - Check date ranges and temporal consistency
  - Verify cross-variable constraints
  - Identify potential data entry errors

### 6. Visualization Generation
- Create comprehensive set of visualizations:
  - Histograms for all numeric variables
  - Boxplots for numeric variables by key groups
  - Bar charts for categorical variables
  - Correlation heatmap
  - Missing data pattern visualization
  - Scatter plots for variable relationships
  - Time series plots if applicable

### 7. Report Generation
- Compile all analyses into comprehensive report
- Include executive summary with key findings
- Provide detailed variable-level analysis
- Document all identified issues with severity levels
- Generate actionable recommendations
- Create interactive HTML report with navigation

## Constraints and Best Practices

### MUST Requirements
- You MUST support multiple file formats (.xpt, .sas7bdat, .csv)
- You MUST calculate comprehensive descriptive statistics
- You MUST identify and flag potential data quality issues
- You MUST generate visualizations for all key analyses
- You MUST provide clear, actionable recommendations
- You MUST preserve data privacy and confidentiality
- You MUST handle missing data appropriately in analyses

### SHOULD Recommendations
- You SHOULD use appropriate statistical tests for comparisons
- You SHOULD provide confidence intervals for estimates
- You SHOULD assess normality before applying parametric tests
- You SHOULD document all assumptions made during analysis
- You SHOULD provide context for identified issues
- You SHOULD generate reproducible analysis code
- You SHOULD follow data visualization best practices

### MAY Options
- You MAY suggest advanced analyses based on findings
- You MAY provide recommendations for data cleaning
- You MAY identify potential analysis challenges
- You MAY suggest additional data collection if needed
- You MAY provide historical comparisons if available

## Error Handling

### Common Issues and Solutions

**Issue**: Dataset file cannot be read
- **Solution**: Try alternative file readers, check file format, verify file path and permissions

**Issue**: Large dataset causes memory issues
- **Solution**: Use data sampling for initial analysis, implement chunked processing, suggest data subset

**Issue**: Missing data patterns are complex
- **Solution**: Apply advanced missing data analysis techniques, flag for expert review, document limitations

**Issue**: Outlier identification produces many false positives
- **Solution**: Adjust detection thresholds, use multiple methods, emphasize need for clinical review

**Issue**: Visualization generation fails
- **Solution**: Simplify complex plots, use alternative visualization methods, provide tabular summaries

