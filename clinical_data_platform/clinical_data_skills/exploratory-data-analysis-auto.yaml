# Automated Exploratory Data Analysis Skill

## Overview
This skill performs comprehensive automated exploratory data analysis (EDA) on clinical trial datasets. It systematically profiles data quality, identifies outliers and anomalies, checks distributions, visualizes relationships between variables, and generates detailed, actionable EDA reports. This skill is essential for data quality assessment, database lock preparation, and initial data understanding before formal statistical analysis.

## Usage
Use this skill when you need to:
- Perform initial data quality assessment after data receipt
- Conduct database lock data review and blind data review
- Identify data quality issues and outliers
- Understand data distributions and patterns
- Explore relationships between variables
- Generate comprehensive data profiling reports
- Support data cleaning and validation processes
- Prepare for formal statistical analysis

## Core Capabilities

### Dataset Overview and Profiling
- **Basic Statistics**: Calculate row count, column count, missing value percentages
- **Variable Analysis**: Analyze each variable for type, unique values, missing patterns
- **Data Quality Metrics**: Assess completeness, consistency, and accuracy
- **Format Validation**: Check variable formats against expected standards
- **Domain Structure**: Validate dataset structure against CDISC standards

### Univariate Analysis
- **Numerical Variables**: Calculate N, Mean, SD, Median, IQR, Min, Max
- **Distribution Assessment**: Generate histograms and Q-Q plots
- **Outlier Detection**: Identify statistical outliers using IQR method
- **Normality Testing**: Perform Shapiro-Wilk and other normality tests
- **Categorical Variables**: Calculate frequency distributions and percentages
- **Pattern Recognition**: Identify unusual patterns or unexpected values

### Bivariate and Multivariate Analysis
- **Group Comparisons**: Generate boxplots and mean plots by treatment group
- **Correlation Analysis**: Calculate correlation matrices and generate heatmaps
- **Cross-Tabulation**: Create contingency tables for categorical variables
- **Scatter Plots**: Generate scatter plots for continuous variable relationships
- **Time Series Analysis**: Explore trends over time for longitudinal data
- **Subgroup Analysis**: Analyze patterns across key subgroups

### Data Quality Assessment
- **Missing Data Analysis**: Identify patterns and extent of missing data
- **Outlier Detection**: Flag potential outliers using statistical methods
- **Consistency Checks**: Validate logical consistency across variables
- **Range Validation**: Check values against expected ranges
- **Format Validation**: Verify date, numeric, and character formats
- **Duplicate Detection**: Identify duplicate records or subjects

### Visualization and Reporting
- **Comprehensive Charts**: Generate various plot types for data exploration
- **Interactive Reports**: Create HTML reports with interactive visualizations
- **Executive Summaries**: Provide high-level data quality summaries
- **Detailed Findings**: Document specific issues and recommendations
- **Trend Analysis**: Visualize patterns and trends over time
- **Comparative Analysis**: Compare groups and timepoints

## Input Format

### Required Parameters
- `dataset_path`: Path to the clinical dataset file (supports .xpt, .sas7bdat, .csv)
- `output_report_path`: Path where the EDA report will be saved

### Optional Parameters
- `group_vars`: Array of grouping variables for comparative analysis (e.g., ["TRT01P", "SITEID"])
- `time_vars`: Array of time-related variables for trend analysis (e.g., ["AVISITN", "ADY"])
- `key_variables`: Array of key variables to focus analysis on
- `exclude_vars`: Array of variables to exclude from analysis
- `analysis_depth`: Level of analysis detail ("basic", "standard", "comprehensive")
- `output_format`: Report format ("html", "pdf", "markdown")

