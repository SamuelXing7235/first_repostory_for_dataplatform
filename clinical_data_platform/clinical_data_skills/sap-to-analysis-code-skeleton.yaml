### ADaM Code Framework Example (SAS)

```sas
  /* -----------------------------------------------------------------------
  Program: create_adlb.sas
  Purpose: Create ADaM Basic Data Structure for Laboratory Data (ADLB)
  Source: SDTM LB domain
  SAP Reference: Section 4.2.1, Laboratory Analysis
  Generated: 2026-04-01 by AI Agent
  ----------------------------------------------------------------------- */

  %include "&path/macros/utility_macros.sas";

  /* ADLB Dataset Creation */
  data adlb_raw;
  set sdtm.lb(rename=(lbtestcd=paramcd lbtest=param));
  /* Key Variables */
  keep studyid usubjid param paramcd aval base;

  /* Analysis Value */
  aval = lbstresn;

  /* Baseline Value */
  if lbseq = 1 then base = lbstresn;

  /* Analysis Flag */
  if not missing(aval) then anl01fl = 'Y';
  else anl01fl = '';

  /* Final ADLB Dataset */
  data adlb;
  set adlb_raw;
  /* Standard ADaM Variables */
  keep studyid usubjid subjid trt01p trt01pn param paramcd aval base 
      anl01fl;

  /* Label Variables */
  label studyid = 'Study Identifier'
        usubjid = 'Unique Subject Identifier'
        paramcd = 'Parameter Code'
        param = 'Parameter Description'
        aval = 'Analysis Value'
        base = 'Baseline Value'
        anl01fl = 'Analysis Flag 01';
        run;

  /* QC Checks */
  %qc_check_dataset(adlb);
```

### TFL Code Framework Example (SAS)

```sas
  /* -----------------------------------------------------------------------
  Program: tfl_002_efficacy_table.sas
  Purpose: Generate Efficacy Table - Primary Endpoint Analysis
  SAP Reference: Section 5.1.1, Primary Efficacy Analysis
  Generated: 2026-04-01 by AI Agent
  ----------------------------------------------------------------------- */

  %include "&path/macros/tfl_macros.sas";

  /* Data Preparation for Efficacy Table */
  data tfl_data;
  set adam.adsl(where=(anl01fl='Y'));

  keep usubjid trt01p trt01pn primary_endpoint;

  /* TODO: Implement primary endpoint calculation logic */
  /* Reference SAP Section 5.1.1 for specific calculation method */
  primary_endpoint = .; /* Placeholder - needs implementation */
  run;

  /* Statistical Summary */
  proc means data=tfl_data n mean std median min max maxdec=2;
  class trt01p;
  var primary_endpoint;
  output out=summary_stats;
  run;

  /* Table Generation */
  title1 "Table 14.2.1: Primary Efficacy Endpoint by Treatment Group";
  proc report data=summary_stats nowd;
  column trt01p _freq_ _mean_ _std_ _median_ _min_ _max_;
  define trt01p / display "Treatment Group";
  define _freq_ / display "N";
  define _mean_ / display "Mean";
  define _std_ / display "Std Dev";
  define _median_ / display "Median";
  define _min_ / display "Minimum";
  define _max_ / display "Maximum";
  run;
```

