# Compliance Assessment and Guideline Alignment Skill

## Overview
This skill provides comprehensive compliance assessment of clinical trial documents, analyses, and methodologies with the latest regulatory guidelines, technical standards, and statistical methodology standards. It performs multi-dimensional compliance assessment including regulatory compliance, technical compliance, and methodology compliance. It ensures complete transparency about compliance status, identifies gaps, and provides actionable recommendations with mandatory user confirmation of assessment criteria and versions used.

## Usage
Use this skill when you need to:
- Assess regulatory compliance of clinical trial documents
- Evaluate technical compliance of data and code
- Validate methodology compliance with statistical standards
- Prepare for regulatory submissions
- Identify compliance gaps and risks
- Generate compliance improvement recommendations
- Perform pre-submission compliance checks
- Ensure alignment with latest guidelines and standards

## Core Capabilities

### Regulatory Compliance Assessment
- **ICH Guidelines Compliance**: ICH E8, E9, E6, E2, E3, etc.
- **FDA Guidance Compliance**: FDA guidance documents and regulations
- **EMA Guidelines Compliance**: EMA guidelines and reflection papers
- **PMDA Requirements Compliance**: PMDA guidelines and requirements
- **NMPA Requirements Compliance**: NMPA guidelines and requirements
- **CDISC Standards Compliance**: SDTMIG, ADaMIG, TAUGs, etc.

### Technical Compliance Assessment
- **Data Standards Compliance**: CDISC data structure and format
- **Validation Rules Compliance**: CDISC validation rules
- **Programming Standards Compliance**: Code quality and documentation
- **System Architecture Compliance**: Security, performance, scalability
- **Data Quality Compliance**: Data integrity, completeness, consistency

### Methodology Compliance Assessment
- **Statistical Methods Compliance**: Alignment with ICH E9 and agency guidance
- **Trial Design Compliance**: Alignment with ICH E8 and agency guidance
- **Analysis Plan Compliance**: Alignment with SAP specifications
- **Endpoint Definition Compliance**: Alignment with protocol and SAP
- **Multiplicity Control Compliance**: Proper adjustment for multiple comparisons

### Gap Analysis and Risk Assessment
- **Compliance Gaps**: Identify areas of non-compliance
- **Risk Assessment**: Assess impact and severity of gaps
- **Prioritization**: Prioritize gaps by importance and urgency
- **Root Cause Analysis**: Identify root causes of non-compliance
- **Impact Assessment**: Assess impact on conclusions and submissions

### Recommendations and Remediation
- **Compliance Improvement Recommendations**: Specific actions to achieve compliance
- **Remediation Plans**: Step-by-step plans to address gaps
- **Timeline Recommendations**: Recommended timelines for remediation
- **Resource Requirements**: Resources needed for remediation
- **Validation Strategies**: Strategies to validate compliance improvements

## Input Format

### Required Parameters
- **assessment_target** (required): Target of compliance assessment
  - Examples: "clinical_trial_document", "analysis_dataset", "statistical_analysis", "system_architecture"
  
- **target_content** (required): Content to be assessed
  - Examples: file paths, document content, analysis results, system specifications

### Optional Parameters
- **guideline_type** (optional): Type of guideline or standard
  - Examples: "ICH E9", "CDISC SDTMIG", "FDA Guidance"
  
- **guideline_version** (required): Specific guideline version
  - Must be provided by user, cannot be auto-selected
  - If not provided, must call regulatory_guidelines_intelligence first
  
- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"
  
- **assessment_scope** (optional): Scope of assessment
  - Examples: "full", "regulatory_only", "technical_only", "methodology_only"
  
- **assessment_date** (optional): Date of assessment
  - Default: current date

