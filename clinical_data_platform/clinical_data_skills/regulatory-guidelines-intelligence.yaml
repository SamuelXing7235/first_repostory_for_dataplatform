# Regulatory Guidelines Intelligence Skill

## Overview
This skill provides intelligent retrieval and management of regulatory guidelines, standards, and requirements from global regulatory agencies. It supports version coexistence, time-point queries, and provides complete transparency about guideline versions, acceptance periods, and regulatory agency-specific requirements. This skill ensures users make informed decisions about guideline versions with mandatory user confirmation and complete information transparency.

## Usage
Use this skill when you need to:
- Retrieve the latest regulatory guidelines and standards
- Query guideline versions accepted at specific time points
- Understand version coexistence and acceptance periods
- Get regulatory agency-specific requirements
- Compare different versions of guidelines
- Make informed decisions about guideline version selection
- Prepare for regulatory submissions
- Ensure compliance with current regulatory expectations

## Core Capabilities

### Regulatory Guidelines Retrieval
- **ICH Guidelines**: Retrieve ICH guidelines (E8, E9, E6, E2, E3, etc.)
- **FDA Guidelines**: Retrieve FDA guidance documents and regulations
- **EMA Guidelines**: Retrieve EMA guidelines and reflection papers
- **PMDA Guidelines**: Retrieve PMDA guidelines and requirements
- **NMPA Guidelines**: Retrieve NMPA guidelines and requirements
- **CDISC Standards**: Retrieve CDISC standards (SDTMIG, ADaMIG, TAUGs, etc.)
- **Therapeutic Area Guidelines**: Retrieve therapeutic area-specific guidelines

### Version Management and Coexistence
- **Version History**: Retrieve complete version history and release dates
- **Acceptance Periods**: Identify acceptance periods for each version by agency
- **Version Coexistence**: Identify multiple versions accepted simultaneously
- **Version Comparison**: Compare different versions and identify key differences
- **Migration Paths**: Provide migration paths between versions
- **Deprecation Warnings**: Identify deprecated versions and sunset dates

### Regulatory Agency-Specific Requirements
- **Agency-Specific Acceptance**: Identify which versions are accepted by each agency
- **Agency-Specific Interpretations**: Identify agency-specific interpretations of guidelines
- **Agency-Specific Requirements**: Identify additional requirements by agency
- **Submission Requirements**: Identify submission-specific requirements by agency
- **Local Requirements**: Identify country-specific requirements

### Time-Point Queries
- **Historical Queries**: Query which versions were accepted at historical time points
- **Future Queries**: Query which versions will be accepted at future time points
- **Submission Planning**: Support submission planning with version acceptance information
- **Transition Planning**: Support transition planning between versions

## Input Format

### Required Parameters
- **guideline_type** (required): Type of guideline or standard
  - Examples: "ICH E9", "CDISC SDTMIG", "FDA Guidance for Industry", "EMA Guideline"
  
- **regulatory_agency** (required): Regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA", "ICH"

### Optional Parameters
- **version** (optional): Specific version number
  - If specified, returns detailed information about that version
  - If not specified, returns all valid versions
  
- **time_point** (optional): Query time point
  - Format: "YYYY-MM-DD" or "current" or "submission_date"
  - If specified, returns versions accepted at that time point
  - Default: "current"
  
- **include_deprecated** (optional, default: false): Whether to include deprecated versions
  
- **include_comparison** (optional, default: true): Whether to include version comparison

