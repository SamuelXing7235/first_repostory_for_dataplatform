# Project Manager Task Orchestration Skill

## Overview
This skill serves as the central project manager for all clinical data analysis requests. It decomposes complex user questions into executable tasks, orchestrates the invocation of appropriate skills, tracks execution progress, validates result consistency and completeness, and ensures that final answers are self-consistent and precisely address user needs. This skill is automatically activated for every request to ensure comprehensive and complete task execution.

## Usage
This skill is automatically invoked for every user request to:
- Decompose complex requests into manageable tasks
- Identify and orchestrate required skills
- Track task execution status and dependencies
- Validate result consistency and completeness
- Ensure self-consistent final answers
- Identify and address gaps or inconsistencies
- Provide comprehensive project oversight

## Core Capabilities

### Request Understanding and Task Decomposition
- **Intent Analysis**: Deep understanding of user request intent and objectives
- **Complexity Assessment**: Evaluate request complexity and required effort
- **Task Decomposition**: Break down complex requests into executable subtasks
- **Dependency Identification**: Identify task dependencies and execution order
- **Skill Mapping**: Map tasks to appropriate skills
- **Resource Estimation**: Estimate required resources and time

### Task Orchestration and Coordination
- **Skill Invocation**: Coordinate invocation of required skills in correct order
- **Parameter Management**: Manage parameter passing between skills
- **Dependency Resolution**: Resolve task dependencies and prerequisites
- **Parallel Execution**: Identify opportunities for parallel task execution
- **Progress Tracking**: Track execution progress of all tasks
- **Error Handling**: Handle errors and implement recovery strategies

### Result Collection and Integration
- **Result Aggregation**: Collect results from all executed skills
- **Data Integration**: Integrate data from multiple sources
- **Context Management**: Maintain context across task executions
- **Conflict Resolution**: Identify and resolve conflicts between results
- **Gap Identification**: Identify missing information or incomplete results
- **Consistency Validation**: Validate consistency across all results

### Completion Assessment and Validation
- **Completeness Check**: Verify all required tasks are completed
- **Consistency Validation**: Ensure results are internally consistent
- **Quality Assessment**: Assess quality and accuracy of results
- **Answer Precision**: Verify final answer precisely addresses user question
- **Self-Consistency Check**: Ensure final answer is self-consistent
- **Gap Analysis**: Identify any remaining gaps or issues

### Adaptive Execution and Iteration
- **Gap Filling**: Automatically execute additional tasks to fill identified gaps
- **Inconsistency Resolution**: Resolve inconsistencies through additional analysis
- **Iterative Refinement**: Iteratively refine results until complete and consistent
- **Quality Improvement**: Continuously improve result quality
- **User Feedback Integration**: Integrate user feedback into execution

## Input Format

### Required Parameters
- **user_request**: The original user request/question
  ```json
  {
  "user_request": "Please analyze the efficacy and safety results for Study XYZ and provide a comprehensive interpretation",
  "request_type": "analysis_request",
  "urgency": "normal",
  "context": {
  "study_id": "XYZ",
  "analysis_phase": "final",
  "regulatory_submission": true
  }
  }
  ```

### Optional Parameters
- **available_skills**: Array of available skills for task execution
- **execution_constraints**: Constraints on task execution (time, resources, etc.)
- **quality_thresholds**: Minimum quality thresholds for results
- **iteration_limit**: Maximum number of iterations for refinement
- **user_preferences**: User preferences for execution approach

