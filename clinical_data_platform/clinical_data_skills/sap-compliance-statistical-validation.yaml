# SAP Compliance and Statistical Validation Skill

## Overview
This skill provides comprehensive validation that statistical analyses are conducted in strict compliance with the Statistical Analysis Plan (SAP). It combines deep understanding of SAP structure, CDISC standards, and regulatory requirements with senior biostatistician expertise to verify analysis correctness, identify deviations, and ensure statistical integrity for regulatory submissions. This skill is essential for quality control, regulatory compliance, and maintaining statistical analysis standards.

## Usage
Use this skill when you need to:
- Validate statistical analyses against SAP specifications
- Ensure compliance with regulatory submission requirements
- Conduct quality control before database lock
- Identify deviations from planned analyses
- Verify analysis population definitions
- Assess statistical method applications
- Support regulatory inspection preparation
- Maintain statistical analysis standards and consistency

## Core Capabilities

### SAP Structure and Content Analysis
- **SAP Document Understanding**: Deep analysis of SAP structure and content:
  - Analysis objectives and hypotheses
  - Analysis populations and subgroups
  - Primary and secondary endpoints
  - Statistical methods and models
  - Multiplicity adjustment procedures
  - Missing data handling strategies
  - Sensitivity analyses planned
- **Analysis Plan Extraction**: Systematic extraction of analysis specifications:
  - Detailed analysis flow diagrams
  - Variable definitions and derivations
  - Inclusion/exclusion criteria for analyses
  - Statistical test specifications
  - Significance levels and decision rules
- **Traceability Documentation**: Maintain traceability from SAP to implementation

### Analysis Population Validation
- **Population Definition Verification**: Validate analysis population definitions:
  - Safety Population (SAFFL) definition and application
  - Efficacy Population (EFFL/PP) definition and application
  - Per-Protocol Population (PPFL) definition and application
  - Subgroup population definitions
  - Intent-to-Treat (ITT) population handling
- **Population Flag Validation**: Verify population flag variables:
  - Flag derivation logic correctness
  - Flag application consistency across analyses
  - Flag assignment accuracy
  - Missing flag handling
- **Subject Count Verification**: Verify subject counts across populations:
  - Consistency with SAP specifications
  - Proper handling of screen failures and discontinuations
  - Cross-population subject tracking

### Primary Endpoint Analysis Validation
- **Primary Analysis Method Verification**: Validate primary endpoint analysis:
  - Statistical method matches SAP specification
  - Model specifications are correct (covariates, factors)
  - Analysis population is appropriate
  - Hypothesis testing approach is correct
- **Primary Endpoint Results Verification**: Verify primary endpoint results:
  - Statistical calculations are correct
  - P-values are calculated appropriately
  - Effect estimates are accurate
  - Confidence intervals are correct
- **Primary Analysis Compliance**: Ensure primary analysis follows SAP:
  - No deviations from planned method
  - Proper handling of missing data
  - Correct application of multiplicity adjustments
  - Appropriate sensitivity analyses conducted

### Secondary Endpoint Analysis Validation
- **Secondary Analysis Verification**: Validate secondary endpoint analyses:
  - All planned secondary analyses are conducted
  - Statistical methods match SAP specifications
  - Analysis populations are appropriate
  - Multiplicity handling is correct
- **Hierarchical Testing Validation**: Verify hierarchical testing procedures:
  - Testing order follows SAP specification
  - Stopping rules are applied correctly
  - Alpha allocation is appropriate
  - Re-testing after failures is handled correctly
- **Secondary Results Consistency**: Check consistency across secondary analyses:
  - Results are internally consistent
  - Statistical methods are appropriate
  - Interpretation aligns with statistical findings

### Safety Analysis Validation
- **Safety Population Analysis**: Validate safety analyses:
  - Safety population definition matches SAP
  - All planned safety analyses are conducted
  - Adverse event summaries are correct
  - Laboratory analyses are appropriate
- **Safety Statistical Methods**: Verify safety statistical methods:
  - Descriptive statistics are appropriate
  - Comparison methods are correct
  - Subgroup analyses are conducted as planned
  - Safety signal detection methods are appropriate

### Statistical Method Application Validation
- **Method Specification Verification**: Verify statistical method specifications:
  - Test procedures match SAP (t-test, ANOVA, ANCOVA, etc.)
  - Model specifications are correct (factors, covariates, interactions)
  - Estimation methods are appropriate (MLE, REML, etc.)
  - Variance structures are correct
- **Assumption Validation**: Verify statistical assumptions are addressed:
  - Normality assumptions are checked
  - Variance homogeneity is assessed
  - Independence is verified
  - Model diagnostics are conducted
- **Software Implementation Verification**: Verify software implementation:
  - Correct SAS procedures or R functions are used
  - Procedure options match SAP specifications
  - Code logic is correct
  - Output interpretation is appropriate

### Multiplicity and Alpha Control Validation
- **Multiplicity Assessment**: Verify multiplicity handling:
  - All multiple comparisons are identified
  - Adjustment methods match SAP (Bonferroni, Hochberg, etc.)
  - Family-wise error rate is controlled
  - False discovery rate methods are applied if specified
- **Alpha Allocation Verification**: Verify alpha allocation:
  - Alpha is allocated appropriately across endpoints
  - Hierarchical testing procedures are followed
  - Alpha spending is correct if group sequential
  - Alpha recovery is applied if specified

### Missing Data Handling Validation
- **Missing Data Assessment**: Verify missing data handling:
  - Missing data mechanism is assessed
  - Primary analysis handles missing data as specified
  - Sensitivity analyses for missing data are conducted
  - Missing data patterns are documented
- **Imputation Validation**: Verify imputation methods if used:
  - Imputation method matches SAP specification
  - Imputation assumptions are reasonable
  - Multiple imputation is correctly implemented
  - Imputation diagnostics are conducted

### Sensitivity Analysis Validation
- **Planned Sensitivity Analyses**: Verify planned sensitivity analyses:
  - All planned sensitivity analyses are conducted
  - Methods match SAP specifications
  - Results are properly interpreted
  - Impact on conclusions is assessed
- **Additional Sensitivity Analyses**: Identify additional analyses needed:
  - Unplanned analyses that should be conducted
  - Analyses addressing identified issues
  - Robustness assessments

### Deviation Identification and Assessment
- **SAP Deviation Detection**: Identify deviations from SAP:
  - Methodological deviations
  - Population definition deviations
  - Analysis omission deviations
  - Timing deviations
- **Deviation Impact Assessment**: Assess impact of deviations:
  - Impact on primary conclusions
  - Impact on regulatory compliance
  - Impact on study interpretability
  - Need for protocol amendments
- **Deviation Documentation**: Document all deviations:
  - Nature and extent of deviation
  - Rationale for deviation
  - Impact assessment
  - Resolution recommendations

### TFL Compliance Verification
- **TFL Specification Verification**: Verify TFLs match SAP specifications:
  - All planned TFLs are produced
  - TFL layouts match SAP shells
  - Display formats are correct
  - Statistical summaries are appropriate
- **TFL Content Verification**: Verify TFL content correctness:
  - Subject counts are correct
  - Statistical calculations are accurate
  - Formatting matches specifications
  - Consistency across related TFLs

## Input Format

### Required Parameters
- **sap_path**: Path to Statistical Analysis Plan document
- **analysis_results_path**: Path to analysis results (TFLs, model outputs, logs)
- **dataset_path**: Path to analysis datasets (ADaM datasets)
- **sap_document** (required): Statistical Analysis Plan document
  - File path or content of the SAP
  
- **guideline_version** (required): Regulatory guideline version
  - Must be specified by user
  - Examples: "ICH E9 1998", "ICH E9(R1) 2019"
  - If not provided, must call regulatory_guidelines_intelligence first
  
- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"

### Optional Parameters
- **protocol_path**: Path to Protocol document for context
- **define_xml_path**: Path to Define-XML for variable verification
- **compliance_level**: Level of compliance checking ("strict", "standard", "lenient")
- **focus_areas**: Array of specific areas to focus on (e.g., ["primary", "safety", "populations"])
- **include_recommendations**: Whether to include resolution recommendations (default: true)
- **validation_scope** (optional): Scope of validation
  - Examples: "full", "methodology_only", "technical_only"

