# CDISC Dataset Design Skill

## Overview
This skill specializes in designing CDISC-compliant clinical trial datasets. It bridges the gap between source data (CRF) and regulatory submission requirements by creating detailed dataset specifications for both SDTM and ADaM standards. This skill is essential for ensuring data submission readiness and regulatory compliance.

## Usage
Use this skill when you need to:
- Design SDTM domains from annotated CRF
- Create ADaM dataset specifications based on SAP
- Generate mapping specifications between source and target variables
- Ensure compliance with CDISC implementation guides
- Prepare dataset documentation for regulatory submission
- Support data standardization and interoperability initiatives

## Core Capabilities

### Input Understanding and Analysis
- **Multi-Document Integration**: Receives and analyzes Annotated CRF, Protocol, SAP, and blank CRF as inputs
- **Document Parsing**: Calls `doc_understand_structured` skill to extract key information from each document
- **Requirement Synthesis**: Combines requirements from protocol objectives, SAP analysis plans, and CRF data collection points
- **Standard Version Management**: Identifies applicable CDISC standard versions (SDTMIG, ADaMIG) and therapeutic area guidelines

### SDTM Dataset Design
- **Domain Identification**: Analyzes aCRF and Protocol to identify required SDTM domains (DM, AE, LB, VS, etc.)
- **Variable Structure Design**: For each domain, designs variable structures according to CDISC SDTM IG specifications
- **Mapping Specification Generation**: Creates SDTM mapping specifications in Excel or CSV format, clearly listing:
  - Target SDTM domain and variable names
  - Variable labels, types, and controlled terminology
  - Source CRF form and field references
  - Preliminary conversion logic and transformation rules
- **Domain Relationships**: Establishes relationships between domains (RELREC, SUPPQUAL)
- **Controlled Terminology**: Applies appropriate CDISC controlled terminology (CT) for codelisted variables

### ADaM Dataset Design
- **Analysis Requirements Analysis**: Analyzes SAP to understand analysis endpoints and methods
- **Dataset Planning**: Determines which ADaM datasets need to be created:
  - ADSL (Subject-Level Analysis Dataset) - always required
  - BDS (Basic Data Structure) datasets for specific analyses
  - OCCDS (Other-Clinically Relevant Data Structure) as needed
  - ADTTE (Time-to-Event) for survival analyses
  - ADAE for safety analyses
- **ADSL Design**: Designs ADSL dataset containing:
  - Key demographic information
  - Treatment variables and flags
  - Population flags (SAFFL, EFFL, etc.)
  - Study dates and durations
- **BDS Dataset Design**: For each major analysis, designs BDS datasets defining:
  - Parameter variables (PARAM, PARAMCD)
  - Analysis values (AVAL) and analysis baseline values (BASE)
  - Change from baseline (CHG) and derived variables
  - Core variables and their derivation logic
- **Traceability Documentation**: Generates ADaM specifications detailing:
  - Dataset structure and purpose
  - Variable derivation rules
  - Source traceability to SDTM or original datasets
  - Analysis population definitions

### Risk and Compliance Assessment
- **Standard Compliance**: Evaluates design compliance with CDISC implementation guides
- **Therapeutic Area Considerations**: Identifies therapeutic area-specific requirements (TAUGs)
- **Risk Assessment**: Assesses compliance risks for specific scenarios:
  - Non-standard data types
  - Complex endpoint definitions
  - Unusual study designs
- **Gap Analysis**: Identifies gaps between CRF data collection and analysis requirements
- **Recommendation Generation**: Provides recommendations for:
  - Additional data collection if needed
  - Alternative mapping approaches
  - Documentation requirements for complex mappings

## Input Format

### Required Parameters
- **study_design_document** (required): Study design document
  - File path or content of study design
  
- **cdisc_standard_version** (required): CDISC standard version
  - Must be specified by user
  - Examples:
    - {"standard": "SDTMIG", "version": "3.3"}
    - {"standard": "ADaMIG", "version": "1.1"}
  - If not provided, must call regulatory_guidelines_intelligence first
  
- **regulatory_agency** (required): Target regulatory agency
  - Examples: "FDA", "EMA", "PMDA", "NMPA"
- `acrf_path`: Path to Annotated CRF document
- `sap_path`: Path to Statistical Analysis Plan
- `design_target`: Target design type ("SDTM", "ADaM", or "BOTH")

### Optional Parameters
- `protocol_path`: Path to Protocol document for additional context
- `blank_crf_path`: Path to blank CRF for reference
- `therapeutic_area`: Therapeutic area for TAUG-specific requirements
- `output_format`: Output format for specifications ("Excel", "CSV", "JSON")
- **domain_specific_requirements** (optional): Domain-specific requirements
  - Examples: {"domains": ["DM", "AE", "LB"], "special_variables": [...]}

